<!DOCTYPE html>
<html>
<head>
    <title>Class-Specific Setup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .slot-card { border: 1px solid #dee2e6; padding: 10px; border-radius: 5px; background: white; min-height: 100px; transition: 0.3s; }
        .slot-card:focus-within { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
        .sticky-top-custom { position: sticky; top: 0; background: #f8f9fa; z-index: 1000; padding: 20px 0; border-bottom: 2px solid #ddd; }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body class="bg-light">

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <h4 class="mt-3">Solving Timetable...</h4>
</div>

<div class="container-fluid px-4">
    <div class="sticky-top-custom">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h3>Step 2: Setup Fixed Slots per Class</h3>
                <small class="text-muted">Changes are saved automatically as you type.</small>
            </div>
            <div class="col-md-4">
                <select id="classSelector" class="form-select form-select-lg border-primary" onchange="switchClass()">
                    {% for class_name in class_data.keys() %}
                    <option value="{{ loop.index0 }}">Class {{ class_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2 text-end">
                <button id="genBtn" onclick="runSolver()" class="btn btn-success btn-lg w-100">Generate</button>
            </div>
        </div>
    </div>

    <div class="table-responsive mt-3">
        <table class="table table-bordered bg-white">
            <thead class="table-dark text-center">
                <tr>
                    <th style="width: 80px;">Period</th>
                    {% for d in range(days) %}<th>Day {{ d + 1 }}</th>{% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for p in range(periods) %}
                <tr>
                    <td class="fw-bold bg-light text-center align-middle">P{{ p + 1 }}</td>
                    {% for d in range(days) %}
                    <td>
                        <div class="slot-card">
                            <input type="text" class="form-control form-control-sm mb-1 label-input" 
                                   placeholder="Label (e.g. Lunch)" data-slot="{{d}}-{{p}}">
                            <select class="form-select form-select-sm teacher-select" data-slot="{{d}}-{{p}}">
                                <option value="None">No Teacher</option>
                            </select>
                        </div>
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
const classInfo = JSON.parse('{{ class_data | tojson | safe }}');
const classKeys = Object.keys(classInfo);
const storage = {}; 

function switchClass() {
    const clsIdx = document.getElementById('classSelector').value;
    const currentClassName = classKeys[clsIdx];
    const teachersForClass = classInfo[currentClassName];

    if (!storage[clsIdx]) storage[clsIdx] = {};

    document.querySelectorAll('.slot-card').forEach(card => {
        const labelInput = card.querySelector('.label-input');
        const teacherSelect = card.querySelector('.teacher-select');
        const slot = labelInput.dataset.slot;

        // Reset and rebuild dropdown to avoid duplication
        teacherSelect.innerHTML = '<option value="None">No Teacher</option>';
        teachersForClass.forEach(t => {
            teacherSelect.innerHTML += `<option value="${t.teacher_id}">${t.subject} (${t.teacher})</option>`;
        });

        // Load existing data if available
        const saved = storage[clsIdx][slot] || { label: "", teacher_id: "None" };
        labelInput.value = saved.label;
        teacherSelect.value = saved.teacher_id;
    });
}

document.addEventListener('input', (e) => {
    if (e.target.classList.contains('label-input') || e.target.classList.contains('teacher-select')) {
        const clsIdx = document.getElementById('classSelector').value;
        const card = e.target.closest('.slot-card');
        const slot = e.target.dataset.slot;
        
        if (!storage[clsIdx]) storage[clsIdx] = {};
        
        storage[clsIdx][slot] = {
            label: card.querySelector('.label-input').value,
            teacher_id: card.querySelector('.teacher-select').value
        };
    }
});

function runSolver() {
    const btn = document.getElementById('genBtn');
    const loader = document.getElementById('loader');
    
    btn.disabled = true;
    loader.style.display = 'flex';

    fetch('/run-final-solver', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fixed_slots: storage })
    })
    .then(async response => {
        const data = await response.json();
        if (response.ok && data.status === 'success') {
            window.location.href = data.redirect;
        } else {
            throw new Error(data.message || "Unknown error occurred");
        }
    })
    .catch(err => {
        alert("Error: " + err.message);
        btn.disabled = false;
        loader.style.display = 'none';
    });
}

window.onload = switchClass;
</script>
</body>
</html>
